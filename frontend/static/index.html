<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON FlashBet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <div class="app-logo">TON FlashBet</div>
            <div class="app-balance">Баланс: <span id="balance">0</span> TON</div>
        </header>
        
        <nav class="app-tabs">
            <button class="tab-button active" data-tab="bets">Беты</button>
            <button class="tab-button" data-tab="create">Создать</button>
            <button class="tab-button" data-tab="profile">Профиль</button>
        </nav>
        
        <div class="tab-content" id="bets-tab">
            <!-- Беты content will be loaded here -->
            <div class="bets-list">
                <div class="bet-card">
                    <div class="bet-title">BTC/USDT цена через 1 час</div>
                    <div class="bet-options">
                        <button class="bet-option">Выше $65,000</button>
                        <button class="bet-option">Ниже $65,000</button>
                    </div>
                    <div class="bet-timer">Осталось: 00:45:12</div>
                </div>
                <!-- More bet cards would be dynamically loaded -->
            </div>
        </div>
        
        <div class="tab-content" id="create-tab" style="display: none;">
            <!-- Create bet form -->
            <form class="create-bet-form">
                <div class="form-group">
                    <label for="event-title">Название события</label>
                    <input type="text" id="event-title" placeholder="Например: BTC цена завтра" required>
                </div>
                <div class="form-group">
                    <label for="event-type">Тип события</label>
                    <select id="event-type" required>
                        <option value="">Выберите тип</option>
                        <option value="crypto">Криптовалюта</option>
                        <option value="weather">Погода</option>
                        <option value="news">Новости</option>
                        <option value="personal">Личное</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="outlet-option">Варианты исхода (через запятую)</label>
                    <input type="text" id="outlet-option" placeholder="Например: Выше, Ниже, Равно" required>
                </div>
                <div class="form-group">
                    <label for="close-time">Время закрытия ставки</label>
                    <input type="datetime-local" id="close-time" required>
                </div>
                <button type="submit" class="submit-button">Создать ставку</button>
            </form>
        </div>
        
        <div class="tab-content" id="profile-tab" style="display: none;">
            <!-- Profile content -->
            <div class="profile-info">
                <div class="profile-wallet">
                    <div class="wallet-label">Ваш кошелек</div>
                    <div class="wallet-address" id="wallet-address">Не подключен</div>
                    <button class="connect-wallet-button">Подключить TON кошелек</button>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="total-bets">0</div>
                        <div class="stat-label">Сделано ставок</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="win-rate">0%</div>
                        <div class="stat-label">Процент побед</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="total-won">0 TON</div>
                        <div class="stat-label">Выиграно</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
